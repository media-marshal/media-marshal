spring:
  application:
    name: media-marshal

  datasource:
    url: jdbc:sqlite:/data/media-marshal.db?busy_timeout=10000&journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      # SQLite 同一时间只允许一个写事务；单连接避免并发 pipeline 触发 SQLITE_BUSY。
      maximum-pool-size: 1
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  mail:
    host: ${MEDIA_MARSHAL_MAIL_HOST:}
    port: ${MEDIA_MARSHAL_MAIL_PORT:587}
    username: ${MEDIA_MARSHAL_MAIL_USERNAME:}
    password: ${MEDIA_MARSHAL_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

# ─────────────────────────────────────────────
# MediaMarshal 应用配置
# 除明确仅允许 Web UI 设置的敏感项外，配置可被同名环境变量覆盖
# 环境变量命名规则：MEDIA_MARSHAL_{KEY_UPPER_SNAKE}
# 示例：media-marshal.debug -> MEDIA_MARSHAL_DEBUG
# ─────────────────────────────────────────────
media-marshal:
  tmdb:
    # TMDB API Key 仅通过 Web UI 写入 app_setting，不再从环境变量读取。
    api-key:
    base-url: https://api.themoviedb.org/3
    # 返回语言，zh-CN 优先，fallback 到 en-US
    language: zh-CN
    timeout-seconds: ${MEDIA_MARSHAL_TMDB_TIMEOUT_SECONDS:30}
    confirm-retry-attempts: ${MEDIA_MARSHAL_TMDB_CONFIRM_RETRY_ATTEMPTS:3}

  parser:
    url: ${MEDIA_MARSHAL_PARSER_URL:http://parser:8000}
    timeout-seconds: 5

  watcher:
    # 低于此置信度进入待确认队列（0.0-1.0）
    confidence-threshold: ${MEDIA_MARSHAL_CONFIDENCE_THRESHOLD:0.8}
    # ADR-005：文件事件防抖窗口，防止处理正在拷贝中的大文件
    debounce-seconds: ${MEDIA_MARSHAL_WATCHER_DEBOUNCE_SECONDS:3}

  watch-rule:
    preflight:
      # 保存 WatchRule 前是否校验源目录/目标目录和文件操作能力。
      # Windows 网络盘 / SMB 映射路径可能出现 Java 权限探测误判，可通过环境变量关闭。
      enabled: ${MEDIA_MARSHAL_WATCH_RULE_PREFLIGHT_ENABLED:true}

  # ─── 命名模板（ADR-001）────────────────────────────────────────
  # WatchRule 的 moviePathTemplate / tvPathTemplate 不为空时优先使用规则模板，此处为全局 fallback 默认值
  rename:
    template:
      movie: ${MEDIA_MARSHAL_TEMPLATE_MOVIE:{title} ({year})/{title} ({year})[[ - {resolution}]]{ext}}
      tv: ${MEDIA_MARSHAL_TEMPLATE_TV:{title} ({year})/S{season:02d}/{title} ({year}) - S{season:02d}E{episode:02d}[[ - {resolution}]]{ext}}

  # ─── 废弃配置项（ADR-002，不再生效）────────────────────────────
  # watcher.watch-dirs / output.*-dir / operation.strategy
  # 均已升级为 watch_rule 表字段，不再通过 application.yml 或 .env 配置

  # Debug 模式：开启后打印详细中间过程日志（guessit 原始结果、TMDB 响应、置信度计算等）
  debug: ${MEDIA_MARSHAL_DEBUG:false}

  notification:
    email:
      enabled: ${MEDIA_MARSHAL_EMAIL_ENABLED:false}
      recipient: ${MEDIA_MARSHAL_EMAIL_RECIPIENT:}
