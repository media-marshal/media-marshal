# 本地开发环境配置
# 启动方式：mvn spring-boot:run -Dspring.profiles.active=dev
spring:
  datasource:
    url: jdbc:sqlite:Z:\Data\media-marshal-data\media-marshal-dev.db
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

media-marshal:
  parser:
    url: http://localhost:8000     # parser sidecar 需单独启动：docker compose up parser
  watcher:
    watch-dirs: ""                 # 开发时留空，通过 Web UI 配置或手动触发
