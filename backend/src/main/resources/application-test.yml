# 测试环境配置
# 使用内存 SQLite 避免污染开发数据
spring:
  datasource:
    # 双冒号在 YAML 中需要加引号
    url: "jdbc:sqlite::memory:"
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      # 关闭 Hibernate JDBC 元数据探测，避免 Windows 上 /data/... 路径不存在的 ERROR 日志
      hibernate.boot.allow_jdbc_metadata_access: false

media-marshal:
  parser:
    url: http://localhost:8000
  watcher:
    watch-dirs: ""
